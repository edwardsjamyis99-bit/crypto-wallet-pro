<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CryptoWallet Pro - Multi-Chain Crypto Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_URL = window.location.origin + '/api';

        function App() {
            const [userId, setUserId] = useState(null);
            const [wallets, setWallets] = useState([]);
            const [chains, setChains] = useState([]);
            const [rates, setRates] = useState({});
            const [selectedWallet, setSelectedWallet] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [transactions, setTransactions] = useState([]);
            const [sendAmount, setSendAmount] = useState('');
            const [sendAddress, setSendAddress] = useState('');
            const [sendNote, setSendNote] = useState('');
            const [sendSpeed, setSendSpeed] = useState('normal');
            const [receiveAmount, setReceiveAmount] = useState('');
            const [receiveFrom, setReceiveFrom] = useState('');
            const [receiveNote, setReceiveNote] = useState('');
            const [newWalletName, setNewWalletName] = useState('');
            const [selectedChain, setSelectedChain] = useState('ETH');
            const [loading, setLoading] = useState(false);
            const [showQR, setShowQR] = useState(false);

            useEffect(() => {
                fetchChains();
                fetchRates();
                const savedUserId = localStorage.getItem('userId');
                if (savedUserId) {
                    setUserId(savedUserId);
                    fetchWallets(savedUserId);
                } else {
                    createUser();
                }
            }, []);

            useEffect(() => {
                if (selectedWallet) {
                    fetchTransactions(selectedWallet.id);
                }
            }, [selectedWallet]);

            const createUser = async () => {
                try {
                    const response = await axios.post(`${API_URL}/user/create`);
                    setUserId(response.data.userId);
                    localStorage.setItem('userId', response.data.userId);
                } catch (error) {
                    console.error('Error:', error);
                }
            };

            const fetchChains = async () => {
                try {
                    const response = await axios.get(`${API_URL}/chains`);
                    setChains(response.data);
                } catch (error) {
                    console.error('Error:', error);
                }
            };

            const fetchRates = async () => {
                try {
                    const response = await axios.get(`${API_URL}/rates/all`);
                    setRates(response.data);
                } catch (error) {
                    console.error('Error:', error);
                }
            };

            const fetchWallets = async (uid) => {
                try {
                    const response = await axios.get(`${API_URL}/wallets/${uid}`);
                    setWallets(response.data);
                    if (response.data.length > 0 && !selectedWallet) {
                        setSelectedWallet(response.data[0]);
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            };

            const fetchTransactions = async (walletId) => {
                try {
                    const response = await axios.get(`${API_URL}/transactions/${walletId}`);
                    setTransactions(response.data);
                } catch (error) {
                    console.error('Error:', error);
                }
            };

            const createWallet = async () => {
                if (!selectedChain) return;
                setLoading(true);
                try {
                    await axios.post(`${API_URL}/wallet/create`, {
                        userId,
                        chain: selectedChain,
                        name: newWalletName || `${selectedChain} Wallet`
                    });
                    await fetchWallets(userId);
                    setNewWalletName('');
                    alert('Wallet created successfully!');
                } catch (error) {
                    alert('Failed to create wallet');
                } finally {
                    setLoading(false);
                }
            };

            const sendTransaction = async (e) => {
                e.preventDefault();
                if (!selectedWallet) return;
                setLoading(true);
                try {
                    const response = await axios.post(`${API_URL}/transaction/send`, {
                        fromWalletId: selectedWallet.id,
                        toAddress: sendAddress,
                        amount: parseFloat(sendAmount),
                        currency: selectedWallet.chain,
                        note: sendNote,
                        speed: sendSpeed
                    });
                    
                    if (response.data.receiptUrl) {
                        window.open(response.data.receiptUrl, '_blank');
                    }
                    
                    alert('Transaction sent successfully!');
                    await fetchWallets(userId);
                    await fetchTransactions(selectedWallet.id);
                    setSendAmount('');
                    setSendAddress('');
                    setSendNote('');
                } catch (error) {
                    alert(error.response?.data?.error || 'Transaction failed');
                } finally {
                    setLoading(false);
                }
            };

            const receiveTransaction = async (e) => {
                e.preventDefault();
                if (!selectedWallet) return;
                setLoading(true);
                try {
                    await axios.post(`${API_URL}/transaction/receive`, {
                        walletId: selectedWallet.id,
                        fromAddress: receiveFrom,
                        amount: parseFloat(receiveAmount),
                        currency: selectedWallet.chain,
                        note: receiveNote
                    });
                    alert('Receipt recorded successfully!');
                    await fetchWallets(userId);
                    await fetchTransactions(selectedWallet.id);
                    setReceiveAmount('');
                    setReceiveFrom('');
                    setReceiveNote('');
                } catch (error) {
                    alert('Failed to record receipt');
                } finally {
                    setLoading(false);
                }
            };

            const getRateForWallet = (wallet) => {
                const mapping = {
                    'ETH': 'ethereum', 'BTC': 'bitcoin', 'SOL': 'solana',
                    'BSC': 'binancecoin', 'TRX': 'tron', 'MATIC': 'matic-network', 'AVAX': 'avalanche-2'
                };
                const rateKey = mapping[wallet.chain];
                return rates[rateKey]?.usd || 0;
            };

            const getTotalBalance = () => {
                return wallets.reduce((total, wallet) => {
                    const rate = getRateForWallet(wallet);
                    return total + (wallet.balance * rate);
                }, 0);
            };

            const getChainIcon = (chainId) => {
                const chain = chains.find(c => c.id === chainId);
                return chain ? chain.icon : '💰';
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50">
                    {/* Header */}
                    <div className="bg-white shadow-md sticky top-0 z-10">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex justify-between items-center">
                                <h1 className="text-2xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                                    CryptoWallet Pro
                                </h1>
                                <div className="flex items-center space-x-4">
                                    <div className="text-right">
                                        <div className="text-sm text-gray-500">Total Portfolio</div>
                                        <div className="text-xl font-bold">${getTotalBalance().toFixed(2)}</div>
                                    </div>
                                    <button onClick={() => setShowQR(!showQR)} className="px-4 py-2 bg-gray-100 rounded-lg">
                                        📱
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 py-6">
                        {/* Wallet Selector */}
                        <div className="mb-6 overflow-x-auto">
                            <div className="flex space-x-4">
                                {wallets.map(wallet => (
                                    <button
                                        key={wallet.id}
                                        onClick={() => setSelectedWallet(wallet)}
                                        className={`flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${
                                            selectedWallet?.id === wallet.id
                                                ? 'gradient-bg text-white shadow-lg'
                                                : 'bg-white text-gray-700 hover:shadow-md'
                                        }`}
                                    >
                                        <span className="text-2xl">{getChainIcon(wallet.chain)}</span>
                                        <div className="text-left">
                                            <div className="font-semibold">{wallet.name}</div>
                                            <div className="text-sm opacity-90">{wallet.balance.toFixed(4)} {wallet.chain}</div>
                                        </div>
                                    </button>
                                ))}
                                <button onClick={() => setActiveTab('create-wallet')} className="flex items-center space-x-2 px-4 py-3 bg-white rounded-xl border-2 border-dashed">
                                    <span className="text-2xl">➕</span>
                                    <span>Add Wallet</span>
                                </button>
                            </div>
                        </div>

                        {selectedWallet && (
                            <>
                                {/* Balance Card */}
                                <div className="gradient-bg rounded-2xl p-6 text-white mb-6 shadow-xl">
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <p className="text-purple-100 mb-1">{selectedWallet.name}</p>
                                            <p className="text-3xl font-bold mb-2">{selectedWallet.balance.toFixed(4)} {selectedWallet.chain}</p>
                                            <p className="text-purple-100">≈ ${(selectedWallet.balance * getRateForWallet(selectedWallet)).toFixed(2)} USD</p>
                                        </div>
                                        <div className="text-right">
                                            <div className="bg-white/20 rounded-lg px-3 py-1 text-sm">{selectedWallet.network}</div>
                                            <div className="text-xs mt-2 font-mono">{selectedWallet.address.slice(0, 6)}...{selectedWallet.address.slice(-4)}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Action Buttons */}
                                <div className="grid grid-cols-4 gap-4 mb-6">
                                    <button onClick={() => setActiveTab('send')} className="bg-white p-4 rounded-xl text-center card-hover">
                                        <div className="text-2xl mb-1">📤</div>
                                        <div className="font-semibold">Send</div>
                                    </button>
                                    <button onClick={() => setActiveTab('receive')} className="bg-white p-4 rounded-xl text-center card-hover">
                                        <div className="text-2xl mb-1">📥</div>
                                        <div className="font-semibold">Receive</div>
                                    </button>
                                    <button onClick={() => window.open(`https://etherscan.io/address/${selectedWallet.address}`, '_blank')} className="bg-white p-4 rounded-xl text-center card-hover">
                                        <div className="text-2xl mb-1">🔍</div>
                                        <div className="font-semibold">Explorer</div>
                                    </button>
                                    <button onClick={() => setActiveTab('history')} className="bg-white p-4 rounded-xl text-center card-hover">
                                        <div className="text-2xl mb-1">📜</div>
                                        <div className="font-semibold">History</div>
                                    </button>
                                </div>

                                {/* Content */}
                                <div className="bg-white rounded-xl shadow-lg p-6">
                                    {activeTab === 'send' && (
                                        <form onSubmit={sendTransaction}>
                                            <h2 className="text-xl font-bold mb-4">Send {selectedWallet.chain}</h2>
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="block text-sm font-medium mb-2">Recipient Address</label>
                                                    <input type="text" value={sendAddress} onChange={(e) => setSendAddress(e.target.value)} className="w-full border rounded-lg px-3 py-2 font-mono text-sm" placeholder="0x..." required />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium mb-2">Amount ({selectedWallet.chain})</label>
                                                    <input type="number" step="any" value={sendAmount} onChange={(e) => setSendAmount(e.target.value)} className="w-full border rounded-lg px-3 py-2" required />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium mb-2">Speed</label>
                                                    <select value={sendSpeed} onChange={(e) => setSendSpeed(e.target.value)} className="w-full border rounded-lg px-3 py-2">
                                                        <option value="slow">🐢 Slow (Lower fee)</option>
                                                        <option value="normal">⚡ Normal</option>
                                                        <option value="fast">🚀 Fast (Higher fee)</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium mb-2">Note</label>
                                                    <input type="text" value={sendNote} onChange={(e) => setSendNote(e.target.value)} className="w-full border rounded-lg px-3 py-2" />
                                                </div>
                                                <button type="submit" disabled={loading} className="w-full gradient-bg text-white py-3 rounded-lg font-semibold disabled:opacity-50">
                                                    {loading ? 'Processing...' : 'Send Transaction'}
                                                </button>
                                            </div>
                                        </form>
                                    )}

                                    {activeTab === 'receive' && (
                                        <div>
                                            <h2 className="text-xl font-bold mb-4">Receive {selectedWallet.chain}</h2>
                                            <div className="bg-gray-100 rounded-lg p-4 mb-6 text-center">
                                                <p className="text-sm text-gray-600 mb-2">Your Wallet Address</p>
                                                <p className="font-mono text-sm break-all">{selectedWallet.address}</p>
                                                <button onClick={() => navigator.clipboard.writeText(selectedWallet.address)} className="mt-2 text-purple-600 text-sm">Copy Address</button>
                                            </div>
                                            <form onSubmit={receiveTransaction}>
                                                <h3 className="font-semibold mb-3">Manual Entry</h3>
                                                <div className="space-y-4">
                                                    <div>
                                                        <label className="block text-sm font-medium mb-2">From Address</label>
                                                        <input type="text" value={receiveFrom} onChange={(e) => setReceiveFrom(e.target.value)} className="w-full border rounded-lg px-3 py-2" required />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium mb-2">Amount</label>
                                                        <input type="number" step="any" value={receiveAmount} onChange={(e) => setReceiveAmount(e.target.value)} className="w-full border rounded-lg px-3 py-2" required />
                                                    </div>
                                                    <button type="submit" className="w-full bg-green-600 text-white py-3 rounded-lg font-semibold">Record Receipt</button>
                                                </div>
                                            </form>
                                        </div>
                                    )}

                                    {activeTab === 'history' && (
                                        <div>
                                            <h2 className="text-xl font-bold mb-4">Transaction History</h2>
                                            {transactions.length === 0 ? (
                                                <p className="text-gray-500 text-center py-8">No transactions yet</p>
                                            ) : (
                                                transactions.map(tx => (
                                                    <div key={tx.id} className="border rounded-lg p-4 mb-3">
                                                        <div className="flex justify-between">
                                                            <div>
                                                                <span className={`text-lg ${tx.type === 'send' ? 'text-red-500' : 'text-green-500'}`}>
                                                                    {tx.type === 'send' ? '📤 Sent' : '📥 Received'}
                                                                </span>
                                                                <p className="text-sm text-gray-500 mt-1">{new Date(tx.timestamp).toLocaleString()}</p>
                                                                {tx.note && <p className="text-sm mt-1">{tx.note}</p>}
                                                            </div>
                                                            <div className="text-right">
                                                                <p className="font-bold">{tx.type === 'send' ? '-' : '+'}{tx.amount} {tx.currency}</p>
                                                                {tx.txHash && <button onClick={() => window.open(`https://etherscan.io/tx/${tx.txHash}`, '_blank')} className="text-xs text-purple-600">View →</button>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    )}

                                    {activeTab === 'create-wallet' && (
                                        <div>
                                            <h2 className="text-xl font-bold mb-4">Create New Wallet</h2>
                                            <div className="grid grid-cols-2 gap-3 mb-4">
                                                {chains.map(chain => (
                                                    <button key={chain.id} onClick={() => setSelectedChain(chain.id)} className={`p-3 rounded-lg border-2 ${selectedChain === chain.id ? 'border-purple-600 bg-purple-50' : 'border-gray-200'}`}>
                                                        <div className="text-2xl">{chain.icon}</div>
                                                        <div className="font-semibold">{chain.name}</div>
                                                    </button>
                                                ))}
                                            </div>
                                            <input type="text" value={newWalletName} onChange={(e) => setNewWalletName(e.target.value)} className="w-full border rounded-lg px-3 py-2 mb-4" placeholder="Wallet name (optional)" />
                                            <button onClick={createWallet} className="w-full gradient-bg text-white py-3 rounded-lg font-semibold">Create Wallet</button>
                                        </div>
                                    )}
                                </div>
                            </>
                        )}
                    </div>

                    {/* QR Modal */}
                    {showQR && selectedWallet && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={() => setShowQR(false)}>
                            <div className="bg-white rounded-xl p-6 max-w-sm w-full" onClick={(e) => e.stopPropagation()}>
                                <h3 className="text-xl font-bold mb-4">Receive {selectedWallet.chain}</h3>
                                <div className="bg-gray-100 p-4 rounded-lg mb-4">
                                    <p className="font-mono text-sm break-all">{selectedWallet.address}</p>
                                </div>
                                <button onClick={() => navigator.clipboard.writeText(selectedWallet.address)} className="w-full gradient-bg text-white py-2 rounded-lg">Copy Address</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
